function buildPrompt(cat,aes,zone,wall,light,micro,shot,mr,wd){
  var sn=shot.n,isH=sn===1,isMod=sn===8,isMac=sn===4||sn===5,isCrop=sn===3,isLife=sn>=8,isArch=sn===7;
  var cam;
  if(sn===1){cam=cat.size==="large"?"Camera: 45-degree angled perspective, full-frame camera, 35mm lens, f/8, deep focus, accurate proportions. Product centered in frame against the back wall.":"Camera: 45-degree angled perspective, full-frame camera, 50mm lens, f/8, deep focus, natural proportions, no wide-angle distortion. Product centered in frame at its true physical scale.";}
  else{cam=shot.camera;}
  var t="SELECTED WORLD\nCategory: "+cat.name+"\nEnvironment: "+aes.label+"\nZone: "+zone.short+"\nWall: "+wall.label+"\nLighting: "+light.label+"\n";
  if(isLife)t+="Micro-realism: "+micro.label+"\n";
  if(isMod&&mr)t+="Model: "+mr.label+"\n";
  if(isMod&&wd)t+="Wardrobe: "+wd.label+"\n";
  t+="\n";

  // SHOT HEADERS
  if(isH)t+="SHOT 1 — "+shot.label+"\nCreate a photorealistic premium interior product image of the attached product within a dedicated nursery environment. This scene becomes the reference world for all subsequent shots. The INPUT REFERENCE IMAGE is the sole source of truth for the product. Do not interpret the category name to imagine or generate the product — use ONLY the attached reference image.\n\n";
  else if(isMod)t+="MODEL LIFESTYLE EXTENSION — SHOT 8\nReference environment: EXACT SAME nursery world as Shot 1. Same wall, same floor, same furniture arrangement, same lighting.\nCreate a photorealistic premium lifestyle image of the attached product with one model integrated naturally into the nursery scene. Do not interpret the category name to generate the product — use ONLY the attached reference image.\n\n";
  else if(isCrop)t+="PURE PRODUCT — CLEAN CROP (SHOT 3)\nKeep the same world DNA, lighting quality, and material honesty as Shot 1.\nCreate a photorealistic premium product-focused image of the attached product using a strict stripped-back crop.\n\n";
  else if(isMac)t+="REFERENCE WORLD (LOCKED) — SHOT "+sn+"\nUse the EXACT same wall, floor, lighting, and styling as Shot 1. Do not reinterpret or create new room elements.\n"+shot.objective+"\n\n";
  else if(isArch)t+="SHOT 7 — ARCHITECTURAL CONTEXT\nThis is the ONLY shot where architectural features (arched niches, alcoves, window bays) are permitted.\n"+shot.objective+"\n\n";
  else t+="SHOT "+sn+" — "+shot.label+"\nReference world LOCKED to Shot 1. Use the EXACT same wall, floor, furniture, and styling. Do NOT introduce new architectural features, arches, nooks, or corridors.\n"+shot.objective+"\n\n";

  // PRODUCT ACCURACY
  t+="PRODUCT ACCURACY (CRITICAL)\nMaintain exact color, material, construction, proportions, scale, and product truth for "+cat.name+". "+cat.accuracy+" The product appearance must come 100% from the attached input reference image. Do NOT use the category name to imagine, invent, or generate the product — the reference image is the ONLY source of truth.\n\n";
  if(!isMac&&!isCrop)t+="SHOT OBJECTIVE / FOCUS\n"+shot.objective+"\n\n";

  // STYLING
  t+="STYLING & PLACEMENT (CRITICAL)\n"+shot.styling+"\n";
  if(isH&&(cat.size==="small"||cat.size==="medium"))t+="SCALE: The "+cat.name.toLowerCase()+" is a "+cat.size+"-sized product. It must appear at its realistic physical size within the nursery — smaller than a crib, proportional to a baby.\n";
  if(isLife&&micro)t+="Micro-realism: "+micro.label+".\n";
  t+="\n";

  // ENVIRONMENT — full details ONLY in Shot 1 and Shot 7
  if(isH){
    t+="ENVIRONMENT / ART DIRECTION\n"+aes.mood+". "+zone.label+". "+light.desc+".\nAesthetic language: "+aes.language+".\nWall finish: "+wall.desc+".\nMaterials: "+aes.materials+".\nThis is a nursery — all furniture, proportions, and styling must read as baby/infant appropriate. Do not generate a living room, adult bedroom, or generic interior.\nFLOOR: Use soft wood, light rug, or neutral carpet only. AVOID red brick, dark stone, or heavy industrial flooring.\nWALL CONSISTENCY: Keep the wall as a single continuous flat surface behind the product. Do NOT create deep recessed nooks, arched alcoves, or cutout features in the wall.\n\n";
  } else if(isArch){
    t+="ENVIRONMENT / ART DIRECTION\n"+aes.mood+". "+light.desc+".\nAesthetic language: "+aes.language+".\nWall finish: "+wall.desc+".\nArchitectural features (arches, niches, alcoves) are PERMITTED in this shot only.\nFLOOR: Use soft wood, light rug, or neutral carpet only.\n\n";
  } else if(isMod){
    t+="ENVIRONMENT / CONTINUITY (LOCKED TO SHOT 1)\nUse the EXACT same room as Shot 1 — same wall finish, same floor, same lighting direction, same furniture arrangement.\n"+aes.mood+". "+light.desc+".\nDo NOT move the product to a different location. Keep it against the wall in the same position as Shot 1.\nDo NOT introduce arches, nooks, new walls, or any architectural features not present in Shot 1.\n\nMODEL SETUP\nModel type: "+(mr?mr.desc:"Parent")+" with baby.\nPresence level: Editorial focal presence.\nInteraction type: "+cat.interaction+".\nProduct priority: Editorial mood-first.\n";
    if(wd)t+="Wardrobe: "+wd.desc+". Wardrobe must complement the environment palette — never overpower the product.\n";
    t+="MODEL / PRODUCT RELATIONSHIP\nThe model must not overpower or block the product. The product must remain clearly visible, accurate, and commercially readable.\n\n";
  } else if(isMac||isCrop){
    t+="ENVIRONMENT STYLING CONTINUITY LOCK (CRITICAL)\nUse the EXACT same wall and floor as Shot 1. Do NOT introduce new walls, arches, or architectural elements. Keep the background consistent with the hero shot.\n\n";
  } else {
    t+="ENVIRONMENT / CONTINUITY (LOCKED TO SHOT 1)\nUse the EXACT same room as Shot 1 — same wall finish, same floor, same lighting direction, same props.\nDo NOT introduce arches, nooks, new walls, deep recesses, or any architectural features not present in Shot 1.\nFLOOR: Same as Shot 1. AVOID red brick, dark stone, or heavy industrial flooring.\n\n";
  }

  // COMPOSITION
  if(isH)t+="SCENE COMPOSITION & DEPTH\n"+shot.composition+"\n\n";
  else if(!isMac&&!isCrop)t+="COMPOSITION\n"+shot.composition+"\n\n";
  t+="CAMERA & LENS\n"+cam+"\n\n";

  // CONTROL NOTES
  t+="CONTROL NOTES\n- Maintain exact product accuracy at all times.\n- Do not redesign, stylize away, or improve manufacturing details.\n- Keep the product dominant and commercially legible.\n- No floating props, no visual clutter, no fake scale shifts.\n";
  if(!isH)t+="- Maintain EXACT coherence with the Reference World established in Shot 1.\n- Do NOT introduce new architectural features, arches, nooks, or wall recesses (except Shot 7).\n";
  if(isMod){t+="- Avoid awkward anatomy, fake contact, scale distortion, or exaggerated posing.\n- Keep product in the SAME POSITION as Shot 1.\n";if(mr)t+="- Model appearance: "+mr.desc+".\n";if(wd)t+="- Wardrobe: "+wd.desc+".\n";}
  t+="- Keep the image premium, clean, commercially legible, and physically believable.";
  return t;
}

    {tab==="res"&&(<div>
      <p className="info">Manage all taxonomy pools. Changes reflect immediately in the Generator.</p>
      <div className="fr" style={{marginBottom:14}}><select className="sel" style={{flex:"0 0 220px"}} value={rt} onChange={e=>sRt(e.target.value)}>{Object.entries(poolMap).map(([k,v])=><option key={k} value={k}>{v.label} ({v.d.length})</option>)}</select><input className="inp" value={sq} onChange={e=>sSq(e.target.value)} placeholder="Search..."/><button className="btn-a" onClick={()=>addEntry(rt)}>+ Add</button></div>
      <div className="tb"><div className="tbh"><span style={{flex:"0 0 60px"}}>ID</span><span style={{flex:1}}>Label</span><span style={{flex:2}}>Details</span><span style={{flex:"0 0 80px",textAlign:"right"}}>Actions</span></div>
      {poolMap[rt].d.filter(r=>getLabel(r).toLowerCase().includes(sq.toLowerCase())).map((r,idx)=>(<div key={idx} className="tbr"><span style={{flex:"0 0 60px",fontFamily:"monospace",fontSize:10,color:"#999"}}>{(r[poolMap[rt].mf]||"").toString().slice(0,8)}</span><span style={{flex:1,fontWeight:600,fontSize:12}}>{getLabel(r)}</span><span style={{flex:2,color:"#666",fontSize:11}}>{(getDesc(r)||"").slice(0,100)}</span><span style={{flex:"0 0 80px",display:"flex",gap:4,justifyContent:"flex-end"}}><button className="btn-x" onClick={()=>{sEi({...r,_type:rt});sEmod(true);}}>Edit</button><button className="btn-x d" onClick={()=>delEntry(rt,r[poolMap[rt].mf])}>Del</button></span></div>))}</div>
      <div style={{marginTop:20}}><button className="btn-s" style={{color:"#C44",borderColor:"#C44"}} onClick={reset}>Reset All to Defaults</button></div>
    </div>)}
    {tab==="imp"&&(<div>
      <p className="info">Import or export taxonomy data as JSON.</p>
      <div className="ig"><div className="ic"><h3 className="ict">Export</h3><select className="sel" value={impType} onChange={e=>sImpType(e.target.value)}>{Object.entries(poolMap).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</select><div className="fr" style={{marginTop:10}}><button className="btn-s" onClick={doExport}>Export JSON</button></div></div>
      <div className="ic"><h3 className="ict">Import</h3><select className="sel" style={{width:130,marginBottom:8}} value={impMode} onChange={e=>sImpMode(e.target.value)}><option value="append">Append</option><option value="replace">Replace</option></select><input type="file" accept=".json" ref={fileRef} onChange={onFile} style={{marginBottom:8,fontSize:12}}/><textarea className="ita" value={impText} onChange={e=>sImpText(e.target.value)} placeholder="Paste JSON array..."/><button className="btn-p" onClick={doImport} disabled={!impText.trim()}>Import</button>{impStatus&&<div style={{marginTop:8,padding:"8px 12px",borderRadius:6,background:impStatus.startsWith("ERROR")?"#FDE8E8":"#E8F5E8",color:impStatus.startsWith("ERROR")?"#C44":"#2D5D2D",fontSize:12}}>{impStatus}</div>}</div></div>
    </div>)}
    </main>
    {emod&&ei&&(<div className="mo" onClick={()=>sEmod(false)}><div className="md" onClick={e=>e.stopPropagation()}><div className="mdh"><h3>Edit {poolMap[ei._type]?.label}</h3><button className="mdc" onClick={()=>sEmod(false)}>×</button></div><div className="mdb">
      {Object.entries(ei).filter(([k])=>k!=="_type").map(([k,v])=>(<div key={k}><label className="fl">{k}</label>{typeof v==="string"&&v.length>60?<textarea className="ft" value={v} onChange={e=>sEi({...ei,[k]:e.target.value})} rows={3}/>:<input className="fi" value={v?.toString()||""} onChange={e=>sEi({...ei,[k]:e.target.value})} disabled={k==="id"&&ei._type!=="cats"&&!ei.id?.includes("_")}/>}</div>))}
    </div><div className="mdf"><button className="btn-p" onClick={saveEntry}>Save</button><button className="btn-s" style={{color:"#C44",borderColor:"#C44"}} onClick={()=>delEntry(ei._type,ei[poolMap[ei._type]?.mf])}>Delete</button></div></div></div>)}
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script></body></html>
